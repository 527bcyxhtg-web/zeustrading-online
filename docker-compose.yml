services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - trading-agent-data:/data
    restart: unless-stopped
  mt5-bridge:
    build: .
    command: uvicorn mt5_bridge.server:app --host 0.0.0.0 --port 8789
    env_file:
      - .env
    ports:
      - "8789:8789"
    volumes:
      - trading-agent-data:/data
    restart: unless-stopped

volumes:
  trading-agent-data:
